# Render Blueprint Specification for Retro Arcade Mini-Suite
services:
  - type: web
    name: retro-arcade-mini-suite
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
